<!DOCTYPE html>
<html>
<head>
    <title>HK-UK Legal Consultant | Transnational Law AI</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Montserrat font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Markdown library (marked) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #e6f0ff 0%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a4d8c 0%, #0a2a5e 100%);
            padding: 24px 28px;
            color: white;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1::before {
            content: "⚖️";
            font-size: 2rem;
        }

        .header p {
            font-size: 0.95rem;
            opacity: 0.85;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 12px;
        }

        .chat-box {
            height: 420px;
            overflow-y: auto;
            padding: 24px 28px;
            background: #fafcff;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        .user {
            align-self: flex-end;
        }

        .bot {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #1a4d8c;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .bot .bubble {
            background: white;
            border: 1px solid #d9e3f0;
            color: #1e2a3a;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* markdown styling inside bot bubbles */
        .bot .bubble h1, .bot .bubble h2, .bot .bubble h3 {
            margin: 8px 0 4px;
            font-weight: 600;
        }
        .bot .bubble h3 {
            font-size: 1rem;
        }
        .bot .bubble p {
            margin: 6px 0;
        }
        .bot .bubble ul, .bot .bubble ol {
            margin: 6px 0 6px 20px;
        }
        .bot .bubble li {
            margin: 2px 0;
        }
        .bot .bubble strong {
            font-weight: 700;
            color: #0a2a5e;
        }
        .bot .bubble em {
            font-style: italic;
        }
        .bot .bubble hr {
            margin: 10px 0;
            border: 0;
            height: 1px;
            background: #e2e8f2;
        }

        .time {
            font-size: 0.65rem;
            margin-top: 5px;
            margin-left: 12px;
            opacity: 0.5;
        }

        .input-area {
            padding: 20px 28px 28px 28px;
            background: white;
            border-top: 1px solid #eef2f9;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            border: 1.5px solid #e2e8f2;
            border-radius: 60px;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #1a4d8c;
            box-shadow: 0 0 0 3px rgba(26,77,140,0.1);
        }

        .input-area button {
            background: #1a4d8c;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;
        }

        .input-area button:hover {
            background: #0e3a6b;
            transform: scale(0.97);
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: #eef2fa;
            border-radius: 10px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #b9cef0;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 600px) {
            .message { max-width: 95%; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1>HK-UK Transnational Law Consultant</h1>
        <p>Expert guidance at the intersection of Hong Kong & UK legal systems</p>
        <div class="badge">⚡ Powered by AI | Not a substitute for legal advice</div>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">
            <div class="bubble">Hello! I specialise in Hong Kong-UK cross-border law. Ask me about contracts, company law, dispute resolution, or anything transnational.</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Ask your legal question...">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text, isHtml = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (isHtml && role === 'bot') {
            bubble.innerHTML = text;
        } else {
            bubble.innerText = text;
        }
        messageDiv.appendChild(bubble);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateLastBotMessage(html) {
        const botMessages = document.querySelectorAll('.message.bot');
        if (botMessages.length) {
            const lastBubble = botMessages[botMessages.length-1].querySelector('.bubble');
            lastBubble.innerHTML = html;
        } else {
            addMessage('bot', html, true);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function ask() {
        const question = input.value.trim();
        if (!question) return;
        addMessage('user', question);
        input.value = '';
        addMessage('bot', '⚖️ Thinking...');
        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            const answer = data.answer || data.error || 'No response.';
            // Convert markdown to HTML using marked
            const htmlAnswer = marked.parse(answer);
            updateLastBotMessage(htmlAnswer);
        } catch (err) {
            updateLastBotMessage(`<span style="color:red;">Error: ${err.message}</span>`);
        }
    }

    sendBtn.addEventListener('click', ask);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') ask(); });
</script>
</body>
</html>
