<!DOCTYPE html>
<html>
<head>
    <title>HK-UK Legal Consultant</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        #chat { background: white; border-radius: 8px; padding: 20px; height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .user { text-align: right; color: blue; margin: 10px; }
        .bot { text-align: left; color: green; margin: 10px; }
        input, button { padding: 10px; font-size: 1rem; }
        input { width: 70%; }
        button { width: 25%; }
    </style>
</head>
<body>
    <h1>🤖 HK-UK Transnational Law Consultant</h1>
    <div id="chat"></div>
    <input id="question" placeholder="Ask something about HK-UK law...">
    <button onclick="ask()">Send</button>

    <script>
        async function ask() {
            const input = document.getElementById('question');
            const question = input.value;
            if (!question) return;
            addMessage('user', question);
            input.value = '';
            addMessage('bot', 'Thinking...');
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                updateLastBotMessage(data.answer || data.error);
            } catch (e) {
                updateLastBotMessage('Error: ' + e.message);
            }
        }
        function addMessage(role, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = role;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        function updateLastBotMessage(text) {
            const messages = document.getElementById('chat').getElementsByClassName('bot');
            if (messages.length) messages[messages.length-1].innerText = text;
        }
    </script>
</body>
</html>
